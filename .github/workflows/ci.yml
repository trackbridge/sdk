name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    # Cross-runtime matrix is the dual-send-invariant tripwire: hash.ts has
    # a separate code path for Node 18 (no globalThis.crypto unflagged) vs
    # Node 19+. Testing both ensures the fallback produces byte-identical
    # output to the Web Crypto path. See docs/dual-send-invariant.md.
    name: Typecheck, test, build (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: ['18.17', '20']
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: pnpm/action-setup@903f9c1a6ebcba6cf41d87230be49611ac97822e # v6.0.3
        with:
          version: 9.12.0

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ matrix.node-version }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Build first — tsup's dts emission is a stricter check on the
      # public API surface than `tsc --noEmit` against the test tsconfigs.
      - name: Build
        run: pnpm build

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test
