name: Release

on:
  push:
    branches: [main]

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      id-token: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@903f9c1a6ebcba6cf41d87230be49611ac97822e # v6.0.3
        with:
          version: 9.12.0

      # No `registry-url` here — that flag makes setup-node write an
      # .npmrc with `//registry.npmjs.org/:_authToken=${NODE_AUTH_TOKEN}`,
      # and a broken auth line stops npm from falling through to OIDC
      # (npm interprets it as "auth provided but invalid" instead of
      # "no auth, try Trusted Publishing").
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 20
          cache: pnpm

      # Trusted Publishing (OIDC) requires npm CLI ≥ 11.5.1.
      # Node 20 ships with npm 10.x, so upgrade explicitly. Print the
      # version so future failures here are easy to diagnose.
      - name: Upgrade npm to support Trusted Publishing
        run: |
          npm install -g npm@latest
          npm --version

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build packages
        run: pnpm build

      # Authentication: no NPM_TOKEN is set deliberately. With id-token: write
      # and a Trusted Publisher configured per package on npmjs.com pointing
      # at this repo+workflow, npm CLI authenticates via the OIDC token from
      # GitHub Actions. Provenance is automatically attached.
      - name: Create release PR or publish
        uses: changesets/action@6a0a831ff30acef54f2c6aa1cbbc1096b066edaf # v1
        with:
          publish: pnpm release
          version: pnpm version-packages
          commit: 'chore: version packages'
          title: 'chore: version packages'
          # After each successful publish, also create a GitHub Release per
          # package using the changelog body. Three releases per cycle (one
          # per linked package); publish-changelog-to-docs.yml deduplicates
          # by firing only on the @trackbridge/core release.
          createGithubReleases: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_CONFIG_PROVENANCE: true
